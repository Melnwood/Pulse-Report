[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

# Let API/function requests pass through to the serverless functions.
# This MUST come before the SPA catch-all, or /.netlify/functions/* gets
# swallowed and returns index.html instead of the function response.
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA catch-all — everything else serves the React app.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
